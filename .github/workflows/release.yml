name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            turbo-scanner/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('turbo-scanner/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build Turbo Scanner (Rust)
        run: cargo build --release --manifest-path turbo-scanner/Cargo.toml --target x86_64-pc-windows-msvc

      - name: Restore all projects
        run: |
          dotnet restore src/StorageMaster.Core/StorageMaster.Core.csproj
          dotnet restore src/StorageMaster.Storage/StorageMaster.Storage.csproj
          dotnet restore src/StorageMaster.Platform.Windows/StorageMaster.Platform.Windows.csproj
          dotnet restore tests/StorageMaster.Tests/StorageMaster.Tests.csproj
          dotnet restore src/StorageMaster.UI/StorageMaster.UI.csproj

      - name: Run tests
        run: dotnet test tests/StorageMaster.Tests/StorageMaster.Tests.csproj --verbosity normal --no-restore

      - name: Publish win-x64
        run: |
          dotnet publish src/StorageMaster.UI/StorageMaster.UI.csproj `
            /p:PublishProfile=win-x64 -c Release --no-restore `
            /p:UseXamlCompilerExecutable=true

      - name: Copy Turbo Scanner to publish output
        run: |
          Copy-Item `
            turbo-scanner\target\x86_64-pc-windows-msvc\release\turbo-scanner.exe `
            artifacts\publish\win-x64\turbo-scanner.exe

      # ── Code signing (optional) ────────────────────────────────────────────
      # Set CODE_SIGNING_PFX (base-64-encoded .pfx) and CODE_SIGNING_PFX_PASSWORD
      # in repo Settings → Secrets to enable Authenticode signing.
      - name: Sign binaries (optional)
        env:
          PFX_B64:  ${{ secrets.CODE_SIGNING_PFX }}
          PFX_PASS: ${{ secrets.CODE_SIGNING_PFX_PASSWORD }}
        run: |
          if (-not $env:PFX_B64) { Write-Host "No signing cert configured — skipping."; exit 0 }

          $pfxPath = "$env:RUNNER_TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:PFX_B64))

          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
                         -Recurse -Filter signtool.exe |
                       Sort-Object FullName -Descending |
                       Select-Object -First 1).FullName

          Get-ChildItem artifacts\publish\win-x64 -Recurse -Include *.exe,*.dll |
            ForEach-Object {
              & $signtool sign /fd SHA256 /td SHA256 `
                /tr http://timestamp.digicert.com `
                /f $pfxPath /p $env:PFX_PASS $_.FullName
            }

          Remove-Item $pfxPath -Force

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          iscc installer\StorageMaster.iss /DAppVersion=$version

      - name: Sign installer (optional)
        env:
          PFX_B64:  ${{ secrets.CODE_SIGNING_PFX }}
          PFX_PASS: ${{ secrets.CODE_SIGNING_PFX_PASSWORD }}
        run: |
          if (-not $env:PFX_B64) { Write-Host "No signing cert configured — skipping."; exit 0 }

          $pfxPath = "$env:RUNNER_TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:PFX_B64))

          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
                         -Recurse -Filter signtool.exe |
                       Sort-Object FullName -Descending |
                       Select-Object -First 1).FullName

          Get-ChildItem artifacts\installer -Filter *.exe |
            ForEach-Object {
              & $signtool sign /fd SHA256 /td SHA256 `
                /tr http://timestamp.digicert.com `
                /f $pfxPath /p $env:PFX_PASS $_.FullName
            }

          Remove-Item $pfxPath -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/installer/StorageMaster-*-win-x64-Setup.exe
          generate_release_notes: true
          draft: false
          prerelease: false
